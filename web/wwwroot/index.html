<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordy - Online Compiler</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="mobile-warning" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
        <div style="background:white;max-width:340px;margin:20px;padding:28px 24px;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,0.2);text-align:center;font-family:'Segoe UI',sans-serif;">
            <div style="font-size:32px;margin-bottom:12px;">&#128187;</div>
            <div style="font-size:16px;font-weight:600;color:#2b579a;margin-bottom:8px;">Desktop Recommended</div>
            <p style="font-size:13px;color:#555;line-height:1.6;margin:0 0 20px;">Wordy is a document-based programming language that relies on rich formatting. The compiler interface works best on a larger screen.</p>
            <button onclick="document.getElementById('mobile-warning').style.display='none'" style="background:#2b579a;color:white;border:none;padding:8px 24px;border-radius:4px;font-size:13px;cursor:pointer;font-family:inherit;">Continue anyway</button>
        </div>
    </div>
    <script>
        if (window.innerWidth <= 768) {
            document.getElementById('mobile-warning').style.display = 'flex';
        }
    </script>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">X</a>
    </div>
    <!-- SPA routing: restore path from 404.html redirect -->
    <script>
        (function () {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect !== location.href) {
                history.replaceState(null, null, redirect);
            }
        })();
        var q = window.location.search;
        if (q && q[1] === '/') {
            var decoded = q.slice(2).split('&').map(function (s) { return s.replace(/~and~/g, '&'); });
            var path = decoded[0];
            var search = decoded.slice(1).join('&');
            window.history.replaceState(null, null,
                window.location.pathname + (path ? path : '') + (search ? '?' + search : '') + window.location.hash
            );
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.3/dist/docx-preview.min.js"></script>
    <script>
        window.renderDocxPreview = async function (containerId, base64Data) {
            console.log('[docx-preview] called with containerId:', containerId, 'base64 length:', base64Data?.length);
            const container = document.getElementById(containerId);
            console.log('[docx-preview] container element:', container);
            if (!container) { console.error('[docx-preview] container not found!'); return; }
            try {
                const bytes = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
                const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
                console.log('[docx-preview] blob size:', blob.size, 'docx global:', typeof docx);
                await docx.renderAsync(blob, container, null, {
                    className: 'docx-preview-content',
                    inWrapper: false,
                    ignoreWidth: true,
                    ignoreHeight: true,
                });
                console.log('[docx-preview] render complete, container innerHTML length:', container.innerHTML.length);
            } catch (err) {
                console.error('[docx-preview] render error:', err);
            }
        };

        window.toggleDocsNav = function () {
            var iframe = document.querySelector('.docs-frame');
            if (iframe && iframe.contentWindow && iframe.contentWindow.toggleSidebar) {
                iframe.contentWindow.toggleSidebar();
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
