<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordy - Online Compiler</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">X</a>
    </div>
    <!-- SPA routing: restore path from 404.html redirect -->
    <script>
        (function () {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect !== location.href) {
                history.replaceState(null, null, redirect);
            }
        })();
        var q = window.location.search;
        if (q && q[1] === '/') {
            var decoded = q.slice(2).split('&').map(function (s) { return s.replace(/~and~/g, '&'); });
            var path = decoded[0];
            var search = decoded.slice(1).join('&');
            window.history.replaceState(null, null,
                window.location.pathname + (path ? path : '') + (search ? '?' + search : '') + window.location.hash
            );
        }
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
