name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Generate example programs
        run: |
          dotnet run --project bin/cli -- --gen fibonacci docx/generated/Fibonacci.docx
          dotnet run --project bin/cli -- --gen comprehensive docx/generated/Comprehensive.docx
          mkdir -p web/wwwroot/examples
          cp docx/manual/*.docx web/wwwroot/examples/
          cp docx/generated/*.docx web/wwwroot/examples/

      - name: Rewrite base href for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/wordy/" />|' web/wwwroot/index.html

      - name: Publish Blazor WASM
        run: dotnet publish web/web.csproj -c Release -o output

      - name: Copy .nojekyll to output
        run: cp web/wwwroot/.nojekyll output/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
